services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: timetracker-app
    restart: unless-stopped
    working_dir: /var/www/api
    volumes:
      - ./api:/var/www/api
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - timetracker
    depends_on:
      - pgsql
      - redis

  nginx:
    image: nginx:alpine
    container_name: timetracker-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./api:/var/www/api
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - timetracker
    depends_on:
      - app

  pgsql:
    image: postgres:16-alpine
    container_name: timetracker-pgsql
    restart: unless-stopped
    environment:
      POSTGRES_DB: timetracker
      POSTGRES_USER: timetracker
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgsql-data:/var/lib/postgresql/data
    networks:
      - timetracker

  redis:
    image: redis:7-alpine
    container_name: timetracker-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - timetracker

  horizon:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: timetracker-horizon
    restart: unless-stopped
    working_dir: /var/www/api
    command: php artisan horizon
    volumes:
      - ./api:/var/www/api
    networks:
      - timetracker
    depends_on:
      - app
      - redis

  node:
    image: node:22-alpine
    container_name: timetracker-node
    working_dir: /var/www/web
    ports:
      - "5173:5173"
    volumes:
      - ./web:/var/www/web
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - timetracker

networks:
  timetracker:
    driver: bridge

volumes:
  pgsql-data:
    driver: local
